[project]
name = "erdos-97-96-formalization"
slug = "erdos-97-96-formalization"

[paths]
db          = "data/proof-blueprint.db"
lean_lib    = "lean"

[obligations]
root_slug = "root"

[publish]
# P97 primary; P96 is the sibling publish target. Both reach the same five
# named sorry obligations (see docs/sorry-closure-ledger-2026-07-06.md).
target_symbol = ["Problem97.erdos97_rhs", "Problem96.erdos96_rhs"]
state = "wip"  # "wip" | "complete" — config compat; affects no verdict (sorry is always open work)

[axioms]
# Project-declared approved custom axioms (full FQ names). The Lean core
# axioms (propext, Classical.choice, Quot.sound, Lean.ofReduceBool,
# Lean.ofReduceNat) are always approved; do NOT list them here.
# Lean.trustCompiler: native_decide certificate closure under the project's
# bv_decide-standard policy (2026-06-05); approved by Adam 2026-07-06.
approved = ["Lean.trustCompiler"]

[mining]
# Generated certificate subtrees (Erdos9796Proof.P97.{Endpoint,Surplus}Certificate.*)
# — ~97% of the corpus, no proof structure to anchor on. Excluded from the
# proof-blueprint kernel mine and rendered as 🔒 trusted leaves on the spine
# (declared mining boundary). This does not affect Lean imports or `lake-build`:
# imported certificate modules are still compiled. Still indexed, so a cert
# sorry is caught by the source scan and by `#print axioms` on the target; the
# target axiom closure is unaffected.
skip = [
  "*.EndpointCertificate.*",
  "*.SurplusCertificate.*",
  "*.EndpointCertificate.RowZeros.Direct.*",
  "*.EndpointCertificate.RowZeros.Product.*",
  "*.EndpointCertificate.RowZeros.Bank",
  "*.SurplusCertificate.RowZeros.ExactMaskBits.*",
  "*.SurplusCertificate.RowZeros.ShapeFacts.*",
  "*.SurplusCertificate.RowZeros.Direct.*",
  "*.SurplusCertificate.RowZeros.Product.*",
  "*.SurplusCertificate.RowZeros.Bank",
]
